AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Dev Community Pulse Agent

Globals:
  Function:
    Timeout: 60
    MemorySize: 256
    Runtime: python3.12

Resources:
  PulseAgentFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/pulse_agent/handler.lambda_handler
      CodeUri: .
      Architectures:
        - arm64
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: "*"
      Events:
        DailySchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: cron(0 6 * * ? *)
            State: ENABLED
